# SELVOD PRODUCTION STACK (TITAN v20)
networks:
  internal:
    driver: bridge

services:
  backend:
    build:
      context: ./backend
    container_name: selvod-backend
    networks:
      - internal
    environment:
      - SV_PORT=${SV_PORT}
      - SV_DB_PATH=${SV_DB_PATH}
      - SV_STORAGE_PATH=${SV_STORAGE_PATH}
      - SV_STREAM_SECRET=${SV_STREAM_SECRET}
      - SV_API_KEY=${SV_API_KEY}
      - SV_PLAYBACK_KEY=${SV_PLAYBACK_KEY}
      - SV_BASE_URL=${SV_BASE_URL}
      - SV_MAX_WORKERS=${SV_MAX_WORKERS}
    volumes:
      - ./data:/data
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  nginx:
    build:
      context: ./nginx
    container_name: selvod-nginx
    networks:
      - internal
    ports:
      - "${SV_HTTP_PORT:-80}:80"
      - "${SV_HTTPS_PORT:-443}:443"
    environment:
      - SV_STREAM_SECRET=${SV_STREAM_SECRET}
      - SV_FRONTEND_URL=${SV_FRONTEND_URL}
      - SV_SERVER_NAME=${SV_SERVER_NAME:-localhost}
    volumes:
      - ./data:/data:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
