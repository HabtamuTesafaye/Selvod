# SELVOD LOCAL DEVELOPMENT STACK (v20)
services:
  backend:
    build:
      context: ./backend
    container_name: selvod-backend-local
    environment:
      - SV_PORT=${SV_PORT:-8080}
      - SV_DB_PATH=${SV_DB_PATH:-/data/selvod.db}
      - SV_STORAGE_PATH=${SV_STORAGE_PATH:-/data}
      - SV_STREAM_SECRET=${SV_STREAM_SECRET:-local-dev-secret}
      - SV_API_KEY=${SV_API_KEY:-local-admin-key}
      - SV_PLAYBACK_KEY=${SV_PLAYBACK_KEY:-local-playback-key}
      - SV_BASE_URL=${SV_BASE_URL:-http://localhost:18080}
      - SV_MAX_WORKERS=${SV_MAX_WORKERS:-2}
    volumes:
      - ./data:/data
    ports:
      - "${SV_BACKEND_PORT:-8080}:${SV_PORT:-8080}"
    restart: always

  nginx:
    build:
      context: ./nginx
    container_name: selvod-nginx-local
    ports:
      - "${SV_LOCAL_PORT:-18080}:80"
      - "${SV_LOCAL_HTTPS_PORT:-18443}:443"
    environment:
      - SV_STREAM_SECRET=${SV_STREAM_SECRET:-local-dev-secret}
      - SV_FRONTEND_URL=${SV_FRONTEND_URL:-http://localhost:5173}
      - SV_SERVER_NAME=${SV_SERVER_NAME:-localhost}
    volumes:
      - ./data:/data:ro
      - ./data/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    restart: always
