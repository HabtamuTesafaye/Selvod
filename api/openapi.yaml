openapi: 3.0.3
info:
  title: Selvod API
  description: Headless VOD streaming engine for multi-resolution HLS.
  version: 1.0.0
servers:
  - url: /api/v1
    description: Local Instance

paths:
  /videos:
    post:
      summary: Upload and transcode a video
      tags: [Videos]
      security: [BearerAuth: []]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                title:
                  type: string
      responses:
        '202':
          description: Uploaded and queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Video'
    get:
      summary: List all videos
      tags: [Videos]
      security: [BearerAuth: []]
      responses:
        '200':
          description: List of videos
          content:
            application/json:
              schema:
                type: object
                properties:
                  videos:
                    type: array
                    items:
                      $ref: '#/components/schemas/Video'

  /videos/{id}:
    get:
      summary: Get video details
      tags: [Videos]
      security: [BearerAuth: []]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Video metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Video'
    delete:
      summary: Delete video (Idempotent)
      tags: [Videos]
      security: [BearerAuth: []]
      responses:
        '204':
          description: Deleted

  /videos/{id}/stream:
    get:
      summary: Get signed HLS URL
      tags: [Playback]
      security: [BearerAuth: []]
      responses:
        '200':
          description: Path-based tokenized URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                  token:
                    type: string
                  expires:
                    type: integer
                  expires_in:
                    type: integer

  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        '200':
          description: OK
        '503':
          description: Degraded

components:
  schemas:
    Video:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum: [pending, transcoding, completed, failed]
        upload_size_bytes:
          type: integer
        total_size_bytes:
          type: integer
        created_at:
          type: string
          format: date-time

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
